name: Automated SAST (Semgrep)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  security-scan:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Semgrep CI
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten"

