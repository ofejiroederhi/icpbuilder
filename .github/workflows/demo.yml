name: Secret Scanner Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  security-check:
    name: Scan for Hardcoded Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Hunt for Secrets
        run: |
          echo "Starting security scan..."
          if grep -qi "password=" app.py; then
            echo "CRITICAL FAILURE: Hardcoded password detected in app.py!"
            exit 1
          else
            echo "Scan phase 1passed. No obvious secrets found."
          fi
      - name: Hunt for Secrets2
        run: |
          echo "Starting 2nd security scan..."
          if grep -qi "OPENAI_API_KEY=" README.md; then
            echo "CRITICAL FAILURE: Hardcoded OPENAI_API_KEY detected in README.md!"
            exit 1
          else
            echo "Scan Phase 2 passed. No obvious secrets found."
          fi
          